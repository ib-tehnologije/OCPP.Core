name: Build and Unit Tests

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore OCPP.Core.sln

      - name: Build
        run: dotnet build OCPP.Core.sln --no-restore

      - name: Test
        run: dotnet test OCPP.Core.Server.Tests/OCPP.Core.Server.Tests.csproj --no-build
